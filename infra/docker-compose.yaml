# docker-compose.yml
# Defines ALL local infrastructure services for this project.
# One command starts everything: docker-compose up -d
#
# Services defined here:
#   1. postgres   — main database (product metadata, schemas)
#   2. redis      — caching layer (search results, reranker cache)
#   3. minio      — object storage (product images, S3-compatible)
#   4. qdrant     — vector database (embeddings for search)
#
# NOT included here (runs separately):
#   - FastAPI backend  → you run this manually with uvicorn
#   - Vite frontend    → you run this manually with npm run dev
#   - Temporal         → added in Phase 4 when we need it

services:

  # ============================================================
  # 1. POSTGRESQL — Main relational database
  # ============================================================
  # Stores: product metadata (sku, title, price, category, etc.)
  # Image: pgvector/pgvector:pg16
  #   → This is PostgreSQL 16 WITH the pgvector extension pre-installed.
  #   → pgvector lets PostgreSQL store and query vectors as a fallback
  #     to Qdrant. We primarily use Qdrant, but having pgvector available
  #     means we have a safety net if needed.
  # ============================================================
  postgres:
    image: postgres:16
    container_name: product_postgres
    # container_name gives the container a fixed name so you can
    # reference it easily in logs and commands instead of a random hash.

    environment:
      - POSTGRES_USER=product_user
      - POSTGRES_PASSWORD=product_pass
      - POSTGRES_DB=product_intelligence
      # These environment variables initialize the database with a user and a database.
      # They match the credentials in your .env and config.py for consistency.
    
    ports:
        - "5432:5432"
        # Format is "host_port:container_port"
        # Left side (5432) = port on YOUR machine
        # Right side (5432) = port inside the Docker container
      # So localhost:5432 on your machine → PostgreSQL inside Docker

    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Volumes persist data between container restarts.
      # Without this, ALL your data is wiped every time you
      # run `docker-compose down` or restart the container.
      # postgres_data is a named volume defined at the bottom of this file.

    healthcheck:
      # Docker will periodically run this command inside the container.
      # If it fails, Docker marks the container as "unhealthy".
      # Other services can wait for postgres to be healthy before starting.
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_intelligence"]
      interval: 10s     # check every 10 seconds
      timeout: 5s       # if no response in 5s, count as failed
      retries: 5        # after 5 failures, mark as unhealthy
      start_period: 10s # give container 10s to boot before first check

    restart: unless-stopped
    # Automatically restart this container if it crashes,
    # unless YOU explicitly stop it with docker-compose stop.

  # ============================================================
  # 2. REDIS — In-memory cache
  # ============================================================
  # Stores: search result cache, reranker result cache
  # Why alpine? The alpine variant is a minimal Linux image (~5MB vs ~100MB).
  # Redis doesn't need a full OS — alpine keeps the container tiny and fast.
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: product_redis

    ports:
      - "6379:6379"

    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename redis.aof
    # Breaking down these Redis config flags:
    #
    # --maxmemory 512mb
    #   Cap Redis memory at 512MB. Without this, Redis will
    #   keep growing and eventually crash your machine.
    #
    # --maxmemory-policy allkeys-lru
    #   LRU = Least Recently Used. When Redis hits 512MB,
    #   it automatically evicts the keys that haven't been
    #   accessed recently. Perfect for a cache — old search
    #   results get dropped first.
    #
    # --appendonly yes
    #   AOF (Append Only File) persistence. Redis writes every
    #   operation to a file so data survives restarts.
    #   Without this, Redis loses everything on container restart.
    #
    # --appendfilename redis.aof
    #   Name of the persistence file.

    volumes:
      - redis_data:/data
      # /data is where Redis stores its persistence files (the .aof file)

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      # redis-cli ping → Redis responds "PONG" if healthy
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    restart: unless-stopped

  # ============================================================
  # 3. MINIO — Object storage (local S3 replacement)
  # ============================================================
  # Stores: product images (downloaded, converted to WebP, stored here)
  # MinIO is 100% S3-compatible — the same boto3 code that talks to
  # MinIO locally will talk to real AWS S3 in production with just
  # a URL change. This is why we use it over just saving to disk.
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: product_minio

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # These match MINIO_ACCESS_KEY and MINIO_SECRET_KEY in your .env
      # In production these would be strong random secrets.

    ports:
      - "9000:9000"
      # Port 9000 = MinIO API port
      # This is what your Python code talks to (boto3 calls go here)
      # MINIO_ENDPOINT=localhost:9000 in your .env points here

      - "9001:9001"
      # Port 9001 = MinIO Web Console
      # Open http://localhost:9001 in your browser
      # Login: minioadmin / minioadmin
      # You can visually browse your stored images here — very useful for debugging

    command: server /data --console-address ":9001"
    # server /data   → start MinIO, store all data in /data directory
    # --console-address ":9001"  → run the web UI on port 9001

    volumes:
      - minio_data:/data
      # Without this volume, all uploaded images are lost on restart

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      # MinIO has a built-in health endpoint
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    restart: unless-stopped

  # ============================================================
  # 4. QDRANT — Vector database
  # ============================================================
  # Stores: product embeddings (CLIP 768-dim, DINOv2 1024-dim, BGE 1024-dim)
  # Qdrant is specifically built for high-dimensional vector storage
  # and approximate nearest neighbour (ANN) search.
  # We create 3 separate "collections" inside Qdrant — one per model.
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: product_qdrant

    ports:
      - "6333:6333"
      # Port 6333 = Qdrant HTTP REST API
      # Your Python qdrant-client talks to this port
      # QDRANT_HOST=localhost, QDRANT_PORT=6333 in your .env

      - "6334:6334"
      # Port 6334 = Qdrant gRPC API
      # gRPC is faster than HTTP for bulk operations (embedding millions of products)
      # The qdrant-client automatically uses gRPC when available

      - "6335:6335"
      # Port 6335 = Qdrant Web UI dashboard
      # Open http://localhost:6335/dashboard in your browser
      # You can see your collections, run test queries, inspect vectors

    volumes:
      - qdrant_data:/qdrant/storage
      # /qdrant/storage is where Qdrant persists all vector data
      # Without this, all your embeddings are lost on restart
      # Re-embedding 500 products takes several minutes — always persist this

    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      # Explicitly setting ports via env vars as well for clarity

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped

# ============================================================
# NAMED VOLUMES
# ============================================================
# Named volumes are managed by Docker and stored in Docker's
# own directory on your machine (not inside your project folder).
# They persist across container restarts and docker-compose down.
# Only destroyed with: docker-compose down -v  (the -v flag)
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  qdrant_data:
    driver: local